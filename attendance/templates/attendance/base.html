<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>{% block title %}SmartAttend{% endblock %}</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0a0e1a;
      --surface: #111827;
      --card: #1a2235;
      --border: #1e2d42;
      --accent: #3b82f6;
      --accent2: #6366f1;
      --green: #10b981;
      --red: #ef4444;
      --yellow: #f59e0b;
      --text: #f1f5f9;
      --muted: #64748b;
      --soft: #94a3b8;
      --glow: rgba(59,130,246,0.15);
    }

    body {
      font-family: 'Inter', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* Animated background grid */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(rgba(59,130,246,0.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(59,130,246,0.03) 1px, transparent 1px);
      background-size: 40px 40px;
      pointer-events: none;
      z-index: 0;
    }

    .page-wrap {
      position: relative;
      z-index: 1;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* TOP NAV */
    nav {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 16px 32px;
      background: rgba(17,24,39,0.8);
      backdrop-filter: blur(12px);
      border-bottom: 1px solid var(--border);
      position: sticky;
      top: 0;
      z-index: 100;
    }

    .nav-brand {
      display: flex;
      align-items: center;
      gap: 10px;
      font-weight: 800;
      font-size: 1.1rem;
      letter-spacing: -0.5px;
      color: var(--text);
      text-decoration: none;
    }

    .nav-brand .dot {
      width: 10px; height: 10px;
      border-radius: 50%;
      background: var(--accent);
      box-shadow: 0 0 12px var(--accent);
      animation: pulse 2s infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; transform: scale(1); }
      50% { opacity: 0.6; transform: scale(0.85); }
    }

    .nav-links { display: flex; gap: 8px; }
    .nav-link {
      padding: 7px 16px;
      border-radius: 8px;
      font-size: 0.85rem;
      font-weight: 500;
      color: var(--soft);
      text-decoration: none;
      transition: all 0.2s;
    }
    .nav-link:hover { background: var(--border); color: var(--text); }
    .nav-link.active { background: var(--accent); color: #fff; }

    /* MAIN */
    main {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 40px 20px;
    }

    .card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 40px;
      width: 100%;
      max-width: 480px;
      box-shadow: 0 0 60px rgba(0,0,0,0.4), 0 0 0 1px rgba(59,130,246,0.05);
      position: relative;
      overflow: hidden;
    }

    .card::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 2px;
      background: linear-gradient(90deg, var(--accent), var(--accent2));
    }

    .card-icon {
      width: 56px; height: 56px;
      border-radius: 14px;
      display: flex; align-items: center; justify-content: center;
      font-size: 1.6rem;
      margin-bottom: 24px;
      background: linear-gradient(135deg, rgba(59,130,246,0.15), rgba(99,102,241,0.15));
      border: 1px solid rgba(59,130,246,0.2);
    }

    h1 { font-size: 1.6rem; font-weight: 800; margin-bottom: 6px; letter-spacing: -0.5px; }
    h2 { font-size: 1.3rem; font-weight: 700; margin-bottom: 6px; }
    .subtitle { color: var(--muted); font-size: 0.9rem; margin-bottom: 28px; line-height: 1.5; }

    /* FORM ELEMENTS */
    .form-group { margin-bottom: 18px; }
    label {
      display: block;
      font-size: 0.8rem;
      font-weight: 600;
      color: var(--soft);
      margin-bottom: 8px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    input[type="text"], input[type="tel"], input[type="number"], input[type="email"] {
      width: 100%;
      padding: 13px 16px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      color: var(--text);
      font-size: 1rem;
      font-family: 'JetBrains Mono', monospace;
      font-weight: 500;
      letter-spacing: 2px;
      transition: all 0.2s;
      outline: none;
    }

    input:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(59,130,246,0.15);
    }

    input::placeholder { color: var(--muted); letter-spacing: 0; font-family: 'Inter', sans-serif; font-size: 0.9rem; }

    .btn {
      width: 100%;
      padding: 14px;
      border: none;
      border-radius: 10px;
      font-size: 0.95rem;
      font-weight: 700;
      cursor: pointer;
      transition: all 0.2s;
      letter-spacing: 0.3px;
    }

    .btn-primary {
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      color: white;
      box-shadow: 0 4px 20px rgba(59,130,246,0.3);
    }
    .btn-primary:hover { transform: translateY(-1px); box-shadow: 0 6px 28px rgba(59,130,246,0.45); }
    .btn-primary:active { transform: translateY(0); }

    .btn-secondary {
      background: var(--surface);
      border: 1px solid var(--border);
      color: var(--soft);
      margin-top: 10px;
    }
    .btn-secondary:hover { background: var(--border); color: var(--text); }

    /* ALERTS */
    .alert {
      padding: 12px 16px;
      border-radius: 10px;
      font-size: 0.88rem;
      margin-bottom: 18px;
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .alert-error { background: rgba(239,68,68,0.1); border: 1px solid rgba(239,68,68,0.25); color: #fca5a5; }
    .alert-success { background: rgba(16,185,129,0.1); border: 1px solid rgba(16,185,129,0.25); color: #6ee7b7; }
    .alert-info { background: rgba(59,130,246,0.1); border: 1px solid rgba(59,130,246,0.25); color: #93c5fd; }

    /* BADGE */
    .badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 4px 10px;
      border-radius: 20px;
      font-size: 0.75rem;
      font-weight: 600;
    }
    .badge-present { background: rgba(16,185,129,0.15); color: var(--green); border: 1px solid rgba(16,185,129,0.3); }
    .badge-absent  { background: rgba(239,68,68,0.12); color: var(--red); border: 1px solid rgba(239,68,68,0.25); }

    /* STEP INDICATOR */
    .steps {
      display: flex;
      align-items: center;
      gap: 0;
      margin-bottom: 28px;
    }
    .step {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 0.78rem;
      font-weight: 600;
      color: var(--muted);
    }
    .step.active { color: var(--accent); }
    .step.done { color: var(--green); }
    .step-num {
      width: 24px; height: 24px;
      border-radius: 50%;
      background: var(--surface);
      border: 1px solid var(--border);
      display: flex; align-items: center; justify-content: center;
      font-size: 0.7rem;
    }
    .step.active .step-num { background: var(--accent); border-color: var(--accent); color: #fff; }
    .step.done .step-num { background: var(--green); border-color: var(--green); color: #fff; }
    .step-line { flex: 1; height: 1px; background: var(--border); margin: 0 6px; }

    /* OTP BOXES */
    .otp-inputs {
      display: flex;
      gap: 10px;
      margin-bottom: 20px;
    }
    .otp-inputs input {
      width: 48px; height: 56px;
      text-align: center;
      font-size: 1.4rem;
      font-weight: 700;
      padding: 0;
      letter-spacing: 0;
    }

    /* CODE DISPLAY */
    .daily-code-display {
      font-family: 'JetBrains Mono', monospace;
      font-size: 2.5rem;
      font-weight: 700;
      letter-spacing: 8px;
      color: var(--accent);
      text-align: center;
      padding: 20px;
      background: rgba(59,130,246,0.07);
      border: 1px solid rgba(59,130,246,0.2);
      border-radius: 12px;
      margin-bottom: 4px;
    }

    .info-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 10px 0;
      border-bottom: 1px solid var(--border);
      font-size: 0.88rem;
    }
    .info-row:last-child { border-bottom: none; }
    .info-label { color: var(--muted); }
    .info-value { font-weight: 600; color: var(--text); font-family: 'JetBrains Mono', monospace; }

    /* ADMIN TABLE */
    .admin-wrap { max-width: 1000px; }
    table { width: 100%; border-collapse: collapse; }
    th, td { padding: 12px 16px; text-align: left; font-size: 0.85rem; border-bottom: 1px solid var(--border); }
    th { color: var(--muted); font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px; font-size: 0.75rem; }
    tr:hover td { background: rgba(255,255,255,0.02); }

    .stat-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 16px; margin-bottom: 28px; }
    .stat-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 20px;
      text-align: center;
    }
    .stat-number { font-size: 2rem; font-weight: 800; font-family: 'JetBrains Mono', monospace; }
    .stat-label { font-size: 0.78rem; color: var(--muted); margin-top: 4px; }

    /* LOCATION WIDGET */
    .loc-widget {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 14px;
      margin-bottom: 18px;
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .loc-icon { font-size: 1.4rem; }
    .loc-status { font-size: 0.85rem; font-weight: 500; }
    .loc-coords { font-size: 0.75rem; color: var(--muted); font-family: 'JetBrains Mono', monospace; }

    /* CAMERA */
    .camera-wrap {
      border-radius: 12px;
      overflow: hidden;
      border: 1px solid var(--border);
      background: #000;
      margin-bottom: 16px;
      position: relative;
    }
    #video { width: 100%; max-height: 200px; object-fit: cover; display: block; }
    #canvas { display: none; }
    #photo-preview { width: 100%; max-height: 200px; object-fit: cover; display: none; border-radius: 12px; }

    .cam-btns { display: flex; gap: 10px; margin-bottom: 18px; }
    .btn-cam {
      flex: 1; padding: 10px; border: 1px solid var(--border);
      border-radius: 8px; background: var(--surface);
      color: var(--soft); font-size: 0.85rem; font-weight: 600;
      cursor: pointer; transition: all 0.2s;
    }
    .btn-cam:hover { background: var(--border); color: var(--text); }
    .btn-cam.snap { background: rgba(59,130,246,0.15); border-color: rgba(59,130,246,0.3); color: var(--accent); }

    /* SUCCESS */
    .success-icon {
      width: 80px; height: 80px;
      border-radius: 50%;
      background: rgba(16,185,129,0.1);
      border: 2px solid var(--green);
      display: flex; align-items: center; justify-content: center;
      font-size: 2.2rem;
      margin: 0 auto 24px;
      animation: pop 0.5s ease;
    }
    @keyframes pop {
      0% { transform: scale(0.5); opacity: 0; }
      70% { transform: scale(1.1); }
      100% { transform: scale(1); opacity: 1; }
    }

    @media (max-width: 600px) {
      nav { padding: 12px 16px; }
      .card { padding: 28px 20px; }
      .stat-grid { grid-template-columns: repeat(3,1fr); gap: 10px; }
      .stat-number { font-size: 1.4rem; }
    }
  </style>
</head>
<body>
<div class="page-wrap">
  <nav>
    <a href="/" class="nav-brand">
      <span class="dot"></span>
      SmartAttend
    </a>
    <div class="nav-links">
      <a href="/" class="nav-link {% block nav_home %}{% endblock %}">Student</a>
      <a href="/admin-login/" class="nav-link {% block nav_admin %}{% endblock %}">Admin</a>
    </div>
  </nav>
  <main>
    {% block content %}{% endblock %}
  </main>
</div>
</body>
</html>
